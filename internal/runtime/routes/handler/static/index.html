      rel="preload"

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css" />

  <body>
    <iframe id="frame"></iframe>
    <div id="status"><span class="dot"></span><span id="stxt">idle</span></div>
    <div id="input-panel" data-open="0">
      <button id="input-panel-toggle">
        <i class="fa-solid fa-message"></i>
      </button>
      <label data-hint="test">
        <textarea
          id="input-panel-input"
          oninput="this.nextElementSibling.innerHTML = this.value.replace(/\n/g, '<br>')"
          placeholder=""
        ></textarea>
        <pre></pre>
      </label>
      <button id="input-panel-send">
        <i class="fa-solid fa-paper-plane"></i>
      </button>
    </div>
